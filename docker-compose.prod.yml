# Production deployment using published Docker Hub images.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required on the host:
#   config/dex.yaml  — Dex static-password configuration
#                      (copy from repo or generate with scripts/init.sh)
#
# Set FLEXBOARD_BASE_URL to the URL the browser uses to reach the app.
# Defaults to http://localhost. Examples:
#   FLEXBOARD_BASE_URL=http://192.168.1.100   docker compose -f docker-compose.prod.yml up -d
#   FLEXBOARD_BASE_URL=https://flexboard.example.com  docker compose -f docker-compose.prod.yml up -d

name: flexboard

services:

  frontend:
    image: kune/flexboard-frontend:latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: kune/flexboard-backend:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      CORS_ORIGIN: ${FLEXBOARD_BASE_URL:-http://localhost}
      DEX_ISSUER: ${FLEXBOARD_BASE_URL:-http://localhost}/dex
      DEX_JWKS_URL: http://dex:5556/dex/keys
    depends_on:
      mongodb:
        condition: service_healthy
      dex:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: dex serve /etc/dex/config.yaml
    environment:
      FLEXBOARD_BASE_URL: ${FLEXBOARD_BASE_URL:-http://localhost}
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
