# Production deployment using published Docker Hub images.
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required on the host:
#   config/dex.yaml  — Dex static-password configuration
#                      (copy from repo or generate with scripts/init.sh)
#
# Note: The frontend SPA has VITE_OIDC_AUTHORITY=http://localhost/dex baked
# in at build time. Access the app through an SSH tunnel so the browser
# reaches it via localhost:
#   ssh -L 80:localhost:80 user@<vm-ip>
# Then open http://localhost in the browser.

name: flexboard

services:

  frontend:
    image: kune/flexboard-frontend:latest
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    image: kune/flexboard-backend:latest
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      DEX_ISSUER: ${DEX_ISSUER:-http://localhost/dex}
      DEX_JWKS_URL: http://dex:5556/dex/keys
    depends_on:
      mongodb:
        condition: service_healthy
      dex:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: dex serve /etc/dex/config.yaml
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
