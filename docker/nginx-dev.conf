server {
    listen 80;
    server_name _;

    # Proxy Rauthy OIDC provider and admin UI (runs in Docker)
    location = /rauthy { return 301 /rauthy/; }
    location /rauthy/ {
        proxy_pass http://rauthy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rauthy 0.35+ unconditionally sets __Host- prefixed Secure cookies.
        # Strip Secure flag and __Host- prefix on the way out; restore on the way in.
        header_filter_by_lua_block {
            local cookies = ngx.header["Set-Cookie"]
            if cookies then
                if type(cookies) == "table" then
                    for i, c in ipairs(cookies) do
                        cookies[i] = c:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                    end
                else
                    cookies = cookies:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                end
                ngx.header["Set-Cookie"] = cookies
            end
        }
        access_by_lua_block {
            local cookie = ngx.req.get_headers()["Cookie"]
            if cookie then
                cookie = ";" .. cookie .. ";"
                cookie = cookie:gsub(";%s*rbid=", ";__Host-rbid=")
                cookie = cookie:gsub(";%s*RauthySession=", ";__Host-RauthySession=")
                cookie = cookie:sub(2, #cookie - 1)
                ngx.req.set_header("Cookie", cookie)
            end
        }
    }
    # Rauthy embeds root-relative /auth/v1/ paths in its login page HTML
    # (CSS theme, JS chunks). These must also be proxied to Rauthy.
    location /auth/v1/ {
        proxy_pass http://rauthy:8080/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rename browser-stored plain cookies back to __Host- format for Rauthy.
        header_filter_by_lua_block {
            local cookies = ngx.header["Set-Cookie"]
            if cookies then
                if type(cookies) == "table" then
                    for i, c in ipairs(cookies) do
                        cookies[i] = c:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                    end
                else
                    cookies = cookies:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                end
                ngx.header["Set-Cookie"] = cookies
            end
        }
        access_by_lua_block {
            local cookie = ngx.req.get_headers()["Cookie"]
            if cookie then
                cookie = ";" .. cookie .. ";"
                cookie = cookie:gsub(";%s*rbid=", ";__Host-rbid=")
                cookie = cookie:gsub(";%s*RauthySession=", ";__Host-RauthySession=")
                cookie = cookie:sub(2, #cookie - 1)
                ngx.req.set_header("Cookie", cookie)
            end
        }
    }

    # Proxy REST and SSE requests to the local backend dev server
    location /api/ {
        proxy_pass http://host.docker.internal:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires buffering disabled
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s;
    }

    # Proxy everything else to the Vite dev server (includes HMR WebSocket)
    location / {
        proxy_pass http://host.docker.internal:5173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
