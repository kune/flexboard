server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all non-asset paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Rauthy OIDC provider and admin UI
    location = /rauthy { return 301 /rauthy/; }
    location /rauthy/ {
        proxy_pass http://rauthy:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rauthy 0.35+ unconditionally sets __Host- prefixed Secure cookies.
        # __Host- cookies require Secure; Safari refuses them over plain HTTP.
        # On HTTP deployments: strip the Secure flag and drop the __Host- prefix
        # on the way out so the browser stores them; rename them back on the way
        # in so Rauthy sees the expected cookie names.
        header_filter_by_lua_block {
            local cookies = ngx.header["Set-Cookie"]
            if cookies then
                if type(cookies) == "table" then
                    for i, c in ipairs(cookies) do
                        cookies[i] = c:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                    end
                else
                    cookies = cookies:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                end
                ngx.header["Set-Cookie"] = cookies
            end
        }
        access_by_lua_block {
            local cookie = ngx.req.get_headers()["Cookie"]
            if cookie then
                cookie = ";" .. cookie .. ";"
                cookie = cookie:gsub(";%s*rbid=", ";__Host-rbid=")
                cookie = cookie:gsub(";%s*RauthySession=", ";__Host-RauthySession=")
                cookie = cookie:sub(2, #cookie - 1)
                ngx.req.set_header("Cookie", cookie)
            end
        }
    }
    # Rauthy embeds root-relative /auth/v1/ paths in its login page HTML
    # (CSS theme, JS chunks). These must also be proxied to Rauthy.
    location /auth/v1/ {
        proxy_pass http://rauthy:8080/auth/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rename browser-stored plain cookies back to __Host- format for Rauthy.
        # (Browser POSTs to /auth/v1/pow and /auth/v1/oidc/authorize need session cookies.)
        # Also rewrite the Location header on the authorize-success redirect:
        # Rauthy's internal 'rauthy' admin/account client has
        # https://localhost/rauthy/auth/v1/oidc/callback registered as redirect_uri
        # (from pub_url = 'localhost/rauthy').  After the access_by_lua rewrite below
        # patches the outgoing redirect_uri to match, Rauthy sends a 302 to that HTTPS
        # URL.  We convert it back to the HTTP path the browser can actually reach.
        header_filter_by_lua_block {
            -- Rewrite callback redirect for the internal 'rauthy' client
            local loc = ngx.header["Location"]
            if loc then
                local new_loc = loc:gsub(
                    "https://localhost/rauthy/auth/v1/oidc/callback",
                    "http://localhost/auth/v1/oidc/callback"
                )
                if new_loc ~= loc then
                    ngx.header["Location"] = new_loc
                end
            end
            -- Strip __Host- prefix and Secure flag from Set-Cookie headers
            local cookies = ngx.header["Set-Cookie"]
            if cookies then
                if type(cookies) == "table" then
                    for i, c in ipairs(cookies) do
                        cookies[i] = c:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                    end
                else
                    cookies = cookies:gsub("__Host%-", ""):gsub("; Secure", ""):gsub(";Secure", "")
                end
                ngx.header["Set-Cookie"] = cookies
            end
        }
        access_by_lua_block {
            -- Rauthy's internal admin/account SPA sends:
            --   redirect_uri=http://localhost/auth/v1/oidc/callback
            -- but the 'rauthy' client has registered:
            --   https://localhost/rauthy/auth/v1/oidc/callback  (from pub_url)
            -- Rewrite the query arg so the authorize request passes validation.
            -- The header_filter above converts the resulting 302 Location back to HTTP.
            local args = ngx.req.get_uri_args()
            if args["client_id"] == "rauthy" and args["redirect_uri"] then
                args["redirect_uri"] = "https://localhost/rauthy/auth/v1/oidc/callback"
                ngx.req.set_uri_args(args)
            end
            -- Rename browser-stored cookies back to __Host- format for Rauthy
            local cookie = ngx.req.get_headers()["Cookie"]
            if cookie then
                cookie = ";" .. cookie .. ";"
                cookie = cookie:gsub(";%s*rbid=", ";__Host-rbid=")
                cookie = cookie:gsub(";%s*RauthySession=", ";__Host-RauthySession=")
                cookie = cookie:sub(2, #cookie - 1)
                ngx.req.set_header("Cookie", cookie)
            end
        }
    }

    # Proxy REST and SSE requests to the backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires these settings to disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s; # keep SSE connections alive for up to 24 h
    }
}
