server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all non-asset paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Dex OIDC provider
    location /dex/ {
        proxy_pass http://dex:5556;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── LLDAP user-management UI ─────────────────────────────────────────────
    # Entry point: proxy /useradmin/ → LLDAP root (trailing slash strips prefix)
    location = /useradmin { return 301 /useradmin/; }
    location /useradmin/ {
        proxy_pass http://lldap:17170/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # LLDAP embeds absolute /static/ paths in its HTML — proxy them here
    location /static/ {
        proxy_pass http://lldap:17170/static/;
        proxy_set_header Host $host;
    }
    # LLDAP GraphQL API — longer prefix takes priority over /api/ below
    location /api/graphql {
        proxy_pass http://lldap:17170/api/graphql;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    # LLDAP auth endpoints — listed individually to avoid catching /auth/callback
    location /auth/simple/ {
        proxy_pass http://lldap:17170/auth/simple/;
        proxy_set_header Host $host;
    }
    location /auth/opaque_token/ {
        proxy_pass http://lldap:17170/auth/opaque_token/;
        proxy_set_header Host $host;
    }
    location /auth/reset/ {
        proxy_pass http://lldap:17170/auth/reset/;
        proxy_set_header Host $host;
    }
    # ─────────────────────────────────────────────────────────────────────────

    # Proxy REST and SSE requests to the backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires these settings to disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s; # keep SSE connections alive for up to 24 h
    }
}
