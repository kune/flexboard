server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — serve index.html for all non-asset paths
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Zitadel — all OIDC/OAuth/UI/management paths
    # Zitadel is configured with EXTERNALPORT 80 so it generates correct absolute URLs.
    location ~ ^/(oauth|oidc|ui/|auth/v1|saml|device|\.well-known|debug|management|admin|system|v2beta/|v2/|v3alpha/) {
        proxy_pass http://zitadel:8080;
        # Force Host: localhost so Zitadel finds the instance (ExternalDomain=localhost)
        # regardless of whether the caller is a browser or an internal Docker service.
        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy REST and SSE requests to the backend
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # SSE requires these settings to disable buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding on;
        proxy_read_timeout 86400s; # keep SSE connections alive for up to 24 h
    }
}
