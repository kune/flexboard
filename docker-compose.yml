name: flexboard

services:

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      # Canonical Rauthy issuer URL injected into /config.js at container startup.
      # For multi-URL deployments set this to the primary URL's /rauthy path;
      # for single-URL deployments the default (FLEXBOARD_BASE_URL/rauthy) is correct.
      OIDC_ISSUER: ${FLEXBOARD_BASE_URL:-http://localhost}/rauthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      # Comma-separated list of allowed origins (multi-URL: add all access URLs).
      CORS_ORIGIN: ${CORS_ORIGIN:-${FLEXBOARD_BASE_URL:-http://localhost}}
      # Issuer as seen in JWT `iss` claim — must match Rauthy's PUB_URL
      RAUTHY_ISSUER: ${FLEXBOARD_BASE_URL:-http://localhost}/rauthy
      # Internal JWKS URL: container-to-container, bypasses nginx
      RAUTHY_JWKS_URL: http://rauthy:8080/oidc/certs
    depends_on:
      mongodb:
        condition: service_healthy
      rauthy:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  rauthy:
    image: ghcr.io/sebadob/rauthy:0.35.1
    environment:
      # Public URL — becomes the OIDC issuer and base for all Rauthy links.
      # Must match the nginx proxy path (no trailing slash).
      PUB_URL: ${FLEXBOARD_BASE_URL:-http://localhost}/rauthy
      LISTEN_ADDRESS: 0.0.0.0
      LISTEN_PORT_HTTP: 8080
      # Required when running behind a reverse proxy
      PROXY_MODE: "true"
      TRUSTED_PROXIES: '["0.0.0.0/0"]'
      # Bootstrap admin account (applied on first start only)
      BOOTSTRAP_ADMIN_EMAIL: ${RAUTHY_ADMIN_EMAIL:-admin@flexboard.localhost}
      BOOTSTRAP_ADMIN_PASSWORD_PLAIN: ${RAUTHY_ADMIN_PASS:-Test1234!}
      # Encryption key for sensitive DB data — auto-generated by init.sh into .env
      ENC_KEYS: ${RAUTHY_ENC_KEYS}
      ENC_KEY_ACTIVE: ${RAUTHY_ENC_KEY_ACTIVE}
    volumes:
      - rauthy-data:/app/data
      # Required: Rauthy panics on startup if config.toml does not exist
      - ./config/rauthy.toml:/app/config.toml:ro
      # Bootstrap OIDC clients — read by Rauthy on first start when no clients exist
      - ./config/rauthy-bootstrap:/app/bootstrap:ro
    ports:
      - "${RAUTHY_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  mongo-data:
  rauthy-data:
