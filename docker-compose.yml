name: flexboard

services:

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      # Canonical Rauthy issuer URL injected into /config.js at container startup.
      # Rauthy always uses https:// in the issuer regardless of deployment scheme.
      # Generated by init.sh into .env as RAUTHY_ISSUER_URL.
      OIDC_ISSUER: ${RAUTHY_ISSUER_URL:-https://localhost/rauthy/auth/v1/}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      # Comma-separated list of allowed origins (multi-URL: add all access URLs).
      CORS_ORIGIN: ${CORS_ORIGIN:-${FLEXBOARD_BASE_URL:-http://localhost}}
      # Issuer as seen in JWT `iss` claim — Rauthy always uses https:// with /auth/v1/ suffix.
      # Generated by init.sh into .env as RAUTHY_ISSUER_URL.
      RAUTHY_ISSUER: ${RAUTHY_ISSUER_URL:-https://localhost/rauthy/auth/v1/}
      # Internal JWKS URL: container-to-container, bypasses nginx.
      RAUTHY_JWKS_URL: http://rauthy:8080/auth/v1/oidc/certs
    depends_on:
      mongodb:
        condition: service_healthy
      rauthy:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  rauthy:
    image: ghcr.io/sebadob/rauthy:0.35.1
    environment:
      # Required when running behind a reverse proxy.
      PROXY_MODE: "true"
      # Plain CIDR string (not JSON array).
      TRUSTED_PROXIES: '0.0.0.0/0'
      # Bootstrap admin account (applied on first start only).
      BOOTSTRAP_ADMIN_EMAIL: ${RAUTHY_ADMIN_EMAIL:-admin@flexboard.localhost}
      BOOTSTRAP_ADMIN_PASSWORD_PLAIN: ${RAUTHY_ADMIN_PASS:-Test1234!}
    volumes:
      - rauthy-data:/app/data
      # Generated by init.sh — contains pub_url, cluster secrets, encryption keys, webauthn.
      - ./config/rauthy.toml:/app/config.toml:ro
      # Bootstrap OIDC clients — read by Rauthy on first start when no clients exist.
      - ./config/rauthy-bootstrap:/app/bootstrap:ro
    ports:
      - "${RAUTHY_PORT:-8080}:8080"
    restart: unless-stopped
    # Rauthy's image has no shell/curl/wget — healthcheck must be disabled.
    # init.sh polls http://HOST:RAUTHY_PORT/auth/v1/health from the host before completing.
    healthcheck:
      disable: true

volumes:
  mongo-data:
  rauthy-data:
