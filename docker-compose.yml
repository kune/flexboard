name: flexboard

services:

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_ZITADEL_CLIENT_ID: ${VITE_ZITADEL_CLIENT_ID}
        VITE_ZITADEL_DOMAIN: ${VITE_ZITADEL_DOMAIN}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      CORS_ORIGIN: http://localhost
      ZITADEL_DOMAIN: http://frontend
      ZITADEL_ISSUER: http://localhost
      ZITADEL_PROJECT_ID: ${ZITADEL_PROJECT_ID}
    depends_on:
      mongodb:
        condition: service_healthy
      zitadel:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    command: start-from-init --masterkey ${ZITADEL_MASTERKEY} --tlsMode disabled --config /etc/zitadel/config.yaml
    volumes:
      - ./config/zitadel.yaml:/etc/zitadel/config.yaml:ro
      - ./machinekey:/machinekey
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: zitadel-db
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: postgres
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${ZITADEL_DB_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 80
      ZITADEL_EXTERNALDOMAIN: localhost
      ZITADEL_TLSMODE: disabled
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: ${ZITADEL_ADMIN_USERNAME:-admin@flexboard.localhost}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      # Service account for API automation — PAT written to /machinekey/sa.pat on first init
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_USERNAME: flexboard-sa
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_MACHINE_NAME: Flexboard Service Account
      ZITADEL_FIRSTINSTANCE_ORG_MACHINE_PAT_EXPIRATIONDATE: "2030-01-01T00:00:00Z"
      ZITADEL_FIRSTINSTANCE_MACHINEKEYPATH: /machinekey/sa.pat
      # Force Login V1 (bundled) — Login V2 requires a separate service with broken
      # CreateCallback permissions in v4.13.1 (session.link not mapped to IAM_OWNER)
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "false"
    depends_on:
      zitadel-db:
        condition: service_healthy
    ports:
      - "${ZITADEL_PORT:-8080}:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/zitadel", "ready"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  zitadel-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zitadel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${ZITADEL_DB_PASSWORD}
    volumes:
      - zitadel-db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  zitadel-db-data:
