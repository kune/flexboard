name: flexboard

services:

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      CORS_ORIGIN: ${FLEXBOARD_BASE_URL:-http://localhost}
      DEX_ISSUER: ${FLEXBOARD_BASE_URL:-http://localhost}/dex
      DEX_JWKS_URL: http://dex:5556/dex/keys
    depends_on:
      mongodb:
        condition: service_healthy
      dex:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: dex serve /etc/dex/config.yaml
    environment:
      FLEXBOARD_BASE_URL: ${FLEXBOARD_BASE_URL:-http://localhost}
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    ports:
      - "${DEX_PORT:-5556}:5556"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mongo-data:
