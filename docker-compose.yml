name: flexboard

services:

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    environment:
      # Canonical Dex issuer injected into /config.js at container startup.
      # Must match the `issuer` field in config/dex.yaml.
      # For multi-URL deployments set this to the primary URL's issuer;
      # for single-URL deployments the default (FLEXBOARD_BASE_URL) is correct.
      DEX_ISSUER: ${FLEXBOARD_BASE_URL:-http://localhost}/dex
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      MONGO_URI: mongodb://mongodb:27017/flexboard
      # Comma-separated list of allowed origins (multi-URL: add all access URLs).
      CORS_ORIGIN: ${CORS_ORIGIN:-${FLEXBOARD_BASE_URL:-http://localhost}}
      DEX_ISSUER: ${FLEXBOARD_BASE_URL:-http://localhost}/dex
      DEX_JWKS_URL: http://dex:5556/dex/keys
    depends_on:
      mongodb:
        condition: service_healthy
      dex:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dex:
    image: ghcr.io/dexidp/dex:v2.41.1
    command: dex serve /etc/dex/config.yaml
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    ports:
      - "${DEX_PORT:-5556}:5556"
    depends_on:
      lldap:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  lldap:
    image: lldap/lldap:stable
    environment:
      # Secret used to sign LLDAP's own session tokens — auto-generated by init.sh
      # and stored in .env. Change it if you set up manually.
      LLDAP_JWT_SECRET: ${LLDAP_JWT_SECRET:-change-this-secret-in-dot-env}
      # Admin credentials — must match the bindPW in config/dex.yaml
      LLDAP_LDAP_USER_PASS: ${LLDAP_ADMIN_PASS:-Test1234!}
      LLDAP_LDAP_USER_EMAIL: admin@flexboard.localhost
      LLDAP_LDAP_BASE_DN: dc=flexboard,dc=localhost
      # Public base URL for the LLDAP web UI — must include the subpath (/useradmin).
      # LLDAP uses this to set <base href> so all asset and API paths resolve correctly.
      LLDAP_HTTP_URL: ${FLEXBOARD_BASE_URL:-http://localhost}/useradmin
    volumes:
      - lldap-data:/data
    ports:
      - "${LLDAP_PORT:-17170}:17170"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/lldap", "healthcheck", "--config-file", "/data/lldap_config.toml"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  mongo-data:
  lldap-data:
