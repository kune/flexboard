# TLS overlay for deployments on private IPs without a trusted certificate.
# Generates a self-signed cert (see scripts/gen-tls-cert.sh) then run:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# Accept the browser security warning once, then HTTPS works.

services:
  frontend:
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "443:443"
    volumes:
      - ./certs/cert.pem:/etc/nginx/certs/cert.pem:ro
      - ./certs/key.pem:/etc/nginx/certs/key.pem:ro
      - ./docker/nginx-tls.conf:/etc/nginx/conf.d/default.conf:ro
