# Development overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

name: flexboard

services:

  # In development, frontend and backend run via pnpm dev (hot reload).
  # Only infrastructure services (MongoDB, Rauthy, nginx) run in Docker.

  frontend:
    # Disable in dev — run with: pnpm --filter @flexboard/frontend dev
    profiles: ["disabled"]

  backend:
    # Disable in dev — run with: pnpm --filter @flexboard/backend dev
    profiles: ["disabled"]

  # Lightweight nginx reverse proxy so http://localhost works in dev, routing:
  #   /rauthy/* → Rauthy container (:8080)
  #   /api/*    → local backend dev server (:3001)
  #   /*        → local Vite dev server (:5173, includes HMR WebSocket)
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${FRONTEND_PORT:-80}:80"
    volumes:
      - ./docker/nginx-dev.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - rauthy
    restart: unless-stopped

  mongodb:
    ports:
      - "27017:27017"  # expose for local tooling (Compass, mongosh)

  rauthy:
    ports:
      - "${RAUTHY_PORT:-8080}:8080"  # expose for local inspection
